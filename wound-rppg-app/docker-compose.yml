services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - sessions_data:/app/sessions
    env_file: .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - UPLOAD_MAX_MB=${UPLOAD_MAX_MB:-2000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sessions_data:
    driver: local
